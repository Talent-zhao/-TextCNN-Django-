<!DOCTYPE html>
{% load static %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>注册 - 贴吧抑郁分析系统</title>
    
    <!-- Bootstrap 3 CSS (与主页一致) -->
    <link href="{% static 'lib/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    
    <style>
        body.auth-page {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-panel">
            <div class="auth-panel-heading">
                <h3 class="panel-title">
                    <span class="glyphicon glyphicon-user" aria-hidden="true"></span>
                    用户注册
                </h3>
            </div>
            <div class="auth-panel-body">
                <form method="POST" id="registerForm">
                    {% csrf_token %}
                    
                    <!-- 消息提示 -->
                    {% for message in messages %}
                        {% if message.tags == 'error' %}
                            <div class="alert-auth alert-danger" role="alert">
                                <span class="glyphicon glyphicon-exclamation-sign" aria-hidden="true"></span>
                                {{ message }}
                            </div>
                        {% elif message.tags == 'success' %}
                            <div class="alert-auth alert-success" role="alert">
                                <span class="glyphicon glyphicon-ok-sign" aria-hidden="true"></span>
                                {{ message }}
                            </div>
                        {% else %}
                            <div class="alert-auth alert-info" role="alert">
                                <span class="glyphicon glyphicon-info-sign" aria-hidden="true"></span>
                                {{ message }}
                            </div>
                        {% endif %}
                    {% endfor %}

                    <div class="auth-form-group">
                        <label for="username">
                            <span class="glyphicon glyphicon-user" aria-hidden="true"></span>
                            用户名
                        </label>
                        <input 
                            type="text" 
                            class="auth-form-control" 
                            id="username" 
                            name="username" 
                            placeholder="请输入用户名（昵称）" 
                            required 
                            autofocus
                        >
                    </div>

                    <div class="auth-form-group">
                        <label for="tel">
                            <span class="glyphicon glyphicon-phone" aria-hidden="true"></span>
                            手机号
                        </label>
                        <input 
                            type="text" 
                            class="auth-form-control" 
                            id="tel" 
                            name="tel" 
                            placeholder="请输入手机号（作为登录账号）" 
                            required
                            pattern="[0-9]{11}"
                            title="请输入11位手机号"
                        >
                        <span class="help-text">手机号将作为您的登录账号</span>
                    </div>

                    <div class="auth-form-group">
                        <label for="pwd">
                            <span class="glyphicon glyphicon-lock" aria-hidden="true"></span>
                            密码
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                class="auth-form-control" 
                                id="pwd" 
                                name="pwd" 
                                placeholder="请输入密码（至少6位）" 
                                required
                                minlength="6"
                            >
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('pwd')" title="显示/隐藏密码">
                                <span class="glyphicon glyphicon-eye-open" id="eye-icon-pwd" aria-hidden="true"></span>
                            </button>
                        </div>
                        <span class="help-text">密码长度至少6位</span>
                    </div>

                    <div class="auth-form-group">
                        <label for="pwdConfirm">
                            <span class="glyphicon glyphicon-lock" aria-hidden="true"></span>
                            确认密码
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                class="auth-form-control" 
                                id="pwdConfirm" 
                                name="pwdConfirm" 
                                placeholder="请再次输入密码" 
                                required
                                minlength="6"
                            >
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('pwdConfirm')" title="显示/隐藏密码">
                                <span class="glyphicon glyphicon-eye-open" id="eye-icon-confirm" aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth-primary btn-auth-success">
                        <span class="glyphicon glyphicon-ok" aria-hidden="true"></span>
                        注册
                    </button>

                    <div class="auth-footer">
                        已有账号？ <a href="{% url 'login' %}">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- jQuery (与主页一致) -->
    <script src="{% static 'js/jquery-1.12.4.min.js' %}"></script>
    <!-- Bootstrap 3 JS -->
    <script src="{% static 'lib/bootstrap/js/bootstrap.min.js' %}"></script>
    
    <script>
        // 密码显示/隐藏切换
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById('eye-icon-' + (inputId === 'pwd' ? 'pwd' : 'confirm'));
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'glyphicon glyphicon-eye-close';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'glyphicon glyphicon-eye-open';
            }
        }

        // 表单验证
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const tel = document.getElementById('tel').value.trim();
            const pwd = document.getElementById('pwd').value;
            const pwdConfirm = document.getElementById('pwdConfirm').value;
            
            // 基本验证
            if (!username || !tel || !pwd || !pwdConfirm) {
                e.preventDefault();
                showAlert('请填写完整的注册信息', 'danger');
                return false;
            }
            
            // 手机号验证
            if (!/^1[3-9]\d{9}$/.test(tel)) {
                e.preventDefault();
                showAlert('请输入正确的手机号', 'danger');
                return false;
            }
            
            // 密码长度验证
            if (pwd.length < 6) {
                e.preventDefault();
                showAlert('密码长度至少6位', 'danger');
                return false;
            }
            
            // 密码确认验证
            if (pwd !== pwdConfirm) {
                e.preventDefault();
                showAlert('两次输入的密码不一致', 'danger');
                return false;
            }
            
            // 显示加载状态
            const submitBtn = this.querySelector('.btn-auth-primary');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
        });

        // 实时密码确认验证
        document.getElementById('pwdConfirm').addEventListener('blur', function() {
            const pwd = document.getElementById('pwd').value;
            const pwdConfirm = this.value;
            const formGroup = this.closest('.auth-form-group');
            
            if (pwdConfirm && pwd !== pwdConfirm) {
                this.setCustomValidity('两次输入的密码不一致');
                formGroup.classList.add('has-error');
                this.style.borderColor = '#a94442';
            } else {
                this.setCustomValidity('');
                formGroup.classList.remove('has-error');
                this.style.borderColor = '#ccc';
            }
        });

        // 显示提示消息
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert-auth alert-' + type;
            alertDiv.setAttribute('role', 'alert');
            alertDiv.innerHTML = '<span class="glyphicon glyphicon-exclamation-sign" aria-hidden="true"></span> ' + message;
            
            const form = document.getElementById('registerForm');
            form.insertBefore(alertDiv, form.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // 输入框聚焦效果
        document.querySelectorAll('.auth-form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>
</html>
