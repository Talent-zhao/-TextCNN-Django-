{% extends "base.html" %}
<!--  title -->
{% block title %}  {{ block.super }}   {% endblock %}
<!--  css -->
{% block css %}
    <style>
    </style>
{% endblock %}
<!--  内容 -->
{% block content %}
    <div class="panel panel-danger">
        <div class="panel-heading" style="background-color:#0367cc;color: white">
            <h3 class="panel-title">词云图</h3>
        </div>
        <div class="panel-body">
            <div id="container" style="height: 500px"></div>
        </div>
    </div>



{% endblock %}
<!--  js -->
{% block js %}
    <script src="/static/js/echart3.js"></script>
    <script src="/static/js/echarts-wordcloud.js"></script>
    <script type="text/javascript">
        var myChart = echarts3.init(document.getElementById('container'));
        var data = [{
            "name": "男神",
            "value": 2.64
        }, {
            "name": "好身材",
            "value": 4.03
        }];
        data = {{  data |safe }};
        var option = {
            series: [{
                type: 'wordCloud',
                sizeRange: [15, 80],
                rotationRange: [0, 0],
                rotationStep: 45,
                gridSize: 8,
                shape: 'pentagon',
                width: '100%',
                height: '100%',
                textStyle: {
                    normal: {
                        color: function () {
                            return 'rgb(' + [
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160)
                            ].join(',') + ')';
                        }
                    }
                },
                data: data
            }]
        };
        // 使用刚指定的配置项和数据显示图表。
        myChart.setOption(option);
        window.addEventListener("resize", function () {
            myChart.resize();
        });
    </script>
{% endblock %}
