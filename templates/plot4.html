        function unitConvert(num) {
            if (num) {
                var moneyUnits = ["", "万"],
                    dividend = 10000,
                    curentNum = num, //转换数字
                    curentUnit = moneyUnits[0]; //转换单位
                for (var i = 0; i < 2; i++) {
                    curentUnit = moneyUnits[i];
                    if (strNumSize(curentNum) < 5) {
                        return num;
                    }
                }
                curentNum = curentNum / dividend;
                var m = {
                    num: 0,
                    unit: ""
                }
                m.num = curentNum.toFixed(2);
                m.unit = curentUnit;
                return m.num + m.unit;
            }
        }

        function strNumSize(tempNum) {
            var stringNum = tempNum.toString()
            var index = stringNum.indexOf(".")
            var newNum = stringNum
            if (index != -1) {
                newNum = stringNum.substring(0, index)
            }
            return newNum.length;
        }

        for (var i = 0; i < toolTipData.length; i++) {

            seriesData[i].name = toolTipData[i].provinceName;//  省份名字
            seriesData[i].value = toolTipData[i].shopCount; // 计算图颜色的值
        }

        var max = Math.max.apply(Math, seriesData.map(function (o) {
                return o.value
            })),
            min = 0; // 侧边最大值最小值
        var maxSize4Pin = 40,
            minSize4Pin = 30;

        var mapName = '';

        function getGeoCoordMap(name) {
            name = name ? name : 'china';
            /*获取地图数据*/
            var geoCoordMap = {};
            myChart.showLoading(); // loading start
            var mapFeatures = echarts.getMap(name).geoJson.features;
            myChart.hideLoading(); // loading end
            mapFeatures.forEach(function (v) {
                var name = v.properties.name; // 地区名称
                geoCoordMap[name] = v.properties.cp; // 地区经纬度
            });
            return geoCoordMap;
        }

        function convertData(data) { // 转换数据
            var geoCoordMap = getGeoCoordMap(mapName);
            var res = [];
            for (var i = 0; i < data.length; i++) {
                var geoCoord = geoCoordMap[data[i].name]; // 数据的名字对应的经纬度
                if (geoCoord) { // 如果数据data对应上，
                    res.push({
                        name: data[i].name,
                        value: geoCoord.concat(data[i].value),
                    });
                }
            }
            return res;
        };

        function initEcharts(pName, Chinese_) {

                        var toolTiphtml = ''
                        for (var i = 0; i < tmp.length; i++) {
                            if (params.name == tmp[i].provinceName) {
                                toolTiphtml += tmp[i].provinceName +  '<br>微博数：' + tmp[i].shopCount;
                            }
                        }
                        return toolTiphtml;
                    }
                },
                visualMap: { //视觉映射组件
                    show: true,
                    min: min,
                    max: max, // 侧边滑动的最大值，从数据中获取
                    left: '5%',
                    top: '96%',
                    inverse: true, //是否反转 visualMap 组件
                    // itemHeight:200,  //图形的高度，即长条的高度
                    text: ['高', '低'], // 文本，默认为数值文本
                    calculable: false, //是否显示拖拽用的手柄（手柄能拖拽调整选中范围）
                    seriesIndex: 1, //指定取哪个系列的数据，即哪个系列的 series.data,默认取所有系列
                    orient: "horizontal",
                    inRange: {
                        color: ['#dbfefe', '#1066d5'] // 蓝绿
                    }
                },
                geo: {
                    show: true,
                    map: pName,
                    roam: false,
                    label: {

                            show: false
                        },
                        emphasis: {
                            show: false,
                        }
                    },
                    itemStyle: {
                        normal: {

                            borderColor: '#097bba',
                        },
                        emphasis: {
                            areaColor: '#fbd456', // 鼠标滑过选中的颜色
                        }
                    }
                },
                series: [{
                    name: '散点',
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: tmpSeriesData,
                    symbolSize: '1',
                    label: {
                        normal: {
                            show: true,
                            formatter: '{b}',
                            position: 'right'
                        },
                        emphasis: {
                            show: true
                        }
                    },
                    itemStyle: {
                        normal: {

                        }
                    }

                        mapType: pName,

                        data: tmpSeriesData,
                        // top: "3%",//组件距离容器的距离
                        // geoIndex: 0,
                        // aspectScale: 0.75,       //长宽比
                        // showLegendSymbol: false, // 存在legend时显示

                                textStyle: {
                                    color: "#323232"
                                }
                            }

                        itemStyle: {
                            normal: {
                                borderWidth: .5, //区域边框宽度
                                borderColor: '#0550c3', //区域边框颜色
                                areaColor: "#0b7e9e", //区域颜色
                            },
                            emphasis: {
                                borderWidth: .5,
                                borderColor: '#4b0082',
                                areaColor: "#ece39e",
                            }
                        }
                    },
                    {
                        name: '点',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        symbol: 'pin', //气泡
                        symbolSize: function (val) {
                            var a = (maxSize4Pin - minSize4Pin) / (max - min);
                            var b = minSize4Pin - a * min;
                            b = maxSize4Pin - a * max;
                            return a * val[2] + b;
                        },
                        label: {
                            normal: {
                                show: true,
                                formatter: function (params) {
                                    return params.data.value[2];
                                },
                                textStyle: {
                                    color: '#fff',
                                    fontSize: 9
                                }
                            }
                        },
                        itemStyle: {
                            normal: {
                                color: 'red' //标志颜色'#F62157'
                            }
                        },
                        zlevel: 6,
                        data: convertData(tmpSeriesData),
                    },
                ]
            };
            myChart.setOption(option);
            /* 响应式 */
            $(window).resize(function () {
                myChart.resize();
            });
        }

        // 初始化echarts-map
        initEcharts("china", "分布地图");
