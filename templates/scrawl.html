{% extends "base.html" %}
<!--  title -->
{% block title %}  {{ block.super }}   {% endblock %}
<!--  css -->
{% block css %}
    <style>
    </style>
{% endblock %}
<!--  内容 -->
{% block content %}

    <div class="panel panel-danger">
        <div class="panel-heading" style="background-color:#0367cc;color: white">
            <h3 class="panel-title">爬取评论</h3>
        </div>
        <div class="panel-body">
            <form class="form-horizontal" action="" method="">
                <div class="form-group">
                    <label class="col-sm-2 control-label">帖子id</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" required
                               placeholder="请输入 帖子id" name="tid" value="8386098945">
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-2 col-sm-10">
                        <button id="submit" type="submit" class="btn btn-success">给我爬</button>
                    </div>
                </div>
            </form>

        </div>
    </div>

{% endblock %}
<!--  js -->
{% block js %}
    <script src="/static/js/alert.js"></script>
    <script src="/static/js/echarts.min.js"></script>
    <script>
        $('#submit').click(function () {
            showLoading({
                title: "正在爬",
                mask: true,
                success: function (res) {
                    {#console.warn(JSON.stringify(res))#}
                }
            });
            var tid = $('input[name="tid"]').val()
            $.ajax({
                url: '{% url "scrawl" %}',
                dataType: 'json',
                method: 'post',
                //JSON.stringify(data.field)
                //data: new FormData(  document.getElementById('submitNote') ),
                data: {
                    'tid': tid
                },
                success: function (data) {
                    hideLoading()
                    alert((data && data.msg) ? data.msg : '爬取结束，已同步到评论列表！')
                    if (data && data.redirect_url) {
                        location.href = data.redirect_url;
                    }
                    return false
                },
                error: function (xhr) {
                    hideLoading()
                    var msg = '爬取失败';
                    try {
                        var j = JSON.parse(xhr.responseText || '{}');
                        if (j.msg) msg = j.msg;
                    } catch (e) {}
                    alert(msg);
                },
            });
            return false
        })
    </script>

{% endblock %}
