{% extends "admin_base.html" %}
{% block title %}{% if edit_obj %}编辑用户{% else %}新建用户{% endif %}{% endblock %}

{% block content %}
<div class="panel panel-default">
    <div class="panel-heading">
        <h3 class="panel-title">{% if edit_obj %}编辑用户 #{{ edit_obj.id }}{% else %}新建用户{% endif %}</h3>
    </div>
    <div class="panel-body">
        <form method="post" class="form-horizontal" style="max-width:920px;">
            {% csrf_token %}

            <div class="form-group">
                <label class="col-sm-2 control-label">昵称</label>
                <div class="col-sm-10">
                    <input class="form-control" name="username" required
                           value="{% if form_post %}{{ form_post.username }}{% elif edit_obj %}{{ edit_obj.username }}{% endif %}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">手机号</label>
                <div class="col-sm-10">
                    <input class="form-control" name="tel" required
                           value="{% if form_post %}{{ form_post.tel }}{% elif edit_obj %}{{ edit_obj.tel }}{% endif %}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">登录密码</label>
                <div class="col-sm-10">
                    <input class="form-control" type="password" name="pwd" autocomplete="new-password"
                           placeholder="{% if edit_obj %}留空则不修改密码{% else %}必填{% endif %}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">邮箱</label>
                <div class="col-sm-10">
                    <input class="form-control" type="email" name="email"
                           value="{% if form_post %}{{ form_post.email }}{% elif edit_obj %}{{ edit_obj.email|default:'' }}{% endif %}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">角色</label>
                <div class="col-sm-10">
                    <select class="form-control" name="role">
                        {% for k,v in role_choices %}
                        <option value="{{ k }}" {% if form_post %}{% if form_post.role == k %}selected{% endif %}
                                {% elif edit_obj %}{% if edit_obj.role == k %}selected{% endif %}{% endif %}>{{ v }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">账号状态</label>
                <div class="col-sm-10">
                    <label class="checkbox-inline">
                        <input type="checkbox" name="is_active" value="on"
                               {% if form_post %}
                                   {% if form_post.is_active == 'on' %}checked{% endif %}
                               {% elif edit_obj %}
                                   {% if edit_obj.is_active %}checked{% endif %}
                               {% else %}
                                   checked
                               {% endif %}>
                        启用（禁用后无法登录前台与后台）
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">性别</label>
                <div class="col-sm-10">
                    <select class="form-control" name="sex">
                        <option value="">未填</option>
                        <option value="男" {% if form_post %}{% if form_post.sex == '男' %}selected{% endif %}{% elif edit_obj and edit_obj.sex == '男' %}selected{% endif %}>男</option>
                        <option value="女" {% if form_post %}{% if form_post.sex == '女' %}selected{% endif %}{% elif edit_obj and edit_obj.sex == '女' %}selected{% endif %}>女</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">地址</label>
                <div class="col-sm-10">
                    <input class="form-control" name="address"
                           value="{% if form_post %}{{ form_post.address }}{% elif edit_obj %}{{ edit_obj.address|default:'' }}{% endif %}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">管理员备注</label>
                <div class="col-sm-10">
                    <input class="form-control" name="admin_note" placeholder="仅后台可见"
                           value="{% if form_post %}{{ form_post.admin_note }}{% elif edit_obj %}{{ edit_obj.admin_note|default:'' }}{% endif %}">
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="{% url 'user_mgmt_list' %}" class="btn btn-default">返回列表</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
